name: Build Deploy and Release

on:
  push:
    branches:
      - release

jobs:
  build-deploy-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:

      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Generate Semantic Version
      - name: Generate Release Version
        id: release_drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Set Version Tag
      - name: Set Tag
        run: |
          echo "TAG=${{ steps.release_drafter.outputs.tag_name }}" >> $GITHUB_ENV

      # Login GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hemanth88970
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/hemanth88970/demo-release-drafter:${{ env.TAG }}
            ghcr.io/hemanth88970/demo-release-drafter:latest

      # Update Kubernetes Deployment
      - name: Update Kubernetes Deployment
        run: |
          sed -i "s|image: .*|image: ghcr.io/hemanth88970/demo-release-drafter:${TAG}|g" k8s/deployment.yaml

      # Commit Deployment YAML
      - name: Commit Deployment Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add k8s/deployment.yaml

          git commit -m "Deploy ${TAG}" || echo "No changes"

          git push

      # Create Git Tag
      - name: Create Git Tag
        run: |
          git tag $TAG
          git push origin $TAG

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}