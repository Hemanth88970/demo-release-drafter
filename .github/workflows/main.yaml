name: Build Deploy and Release

on:
  push:
    branches:
      - release

jobs:
  build-deploy-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Debug Files
      - name: Debug Files
        run: |
          pwd
          ls -la

      # Generate Release Tag
      - name: Set Release Tag
        run: |
          echo "TAG=v1.${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: hemanth88970
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          push: true
          tags: |
            ghcr.io/hemanth88970/demo-release-drafter:${{ env.TAG }}
            ghcr.io/hemanth88970/demo-release-drafter:latest

      # Update Kubernetes Deployment
      - name: Update Kubernetes Deployment
        run: |
          sed -i "s|image: .*|image: ghcr.io/hemanth88970/demo-release-drafter:${TAG}|g" k8s/deployment.yaml

      # Commit Updated Deployment YAML
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add k8s/deployment.yaml

          git commit -m "Update image tag to ${TAG}" || echo "No changes"

          git push

      # Create Git Tag
      - name: Create Git Tag
        run: |
          git tag $TAG
          git push origin $TAG

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}